name: Sync Lockfile

on:
  pull_request:
    paths: [package.json]

permissions:
  contents: read

jobs:
  sync:
    permissions:
      contents: write
    uses: dacrab/.github-workflows/.github/workflows/bun-sync-lockfile.yml@557d081a9d42da0f0c69368256bcc5caf91ada61 # v1.2.0
    with:
      app-client-id: ${{ vars.BOT_APP_CLIENT_ID }}
    secrets:
      app_private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
