version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "07:30"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 3
    groups:
      all-non-major:
        patterns: ["*"]
        update-types: ["patch", "minor"]
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "07:45"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"

